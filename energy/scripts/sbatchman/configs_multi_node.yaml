# LEONARDO Config.
leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_HIGRAPH_0"
    exclusive: true
    gpus: 4
    partition: bench
    tasks_per_node: 4
    time: "01:00:00"

  configs:
    - name: "a2a_n{nodes}_default_{partition_leonardo}"
      exclusive: true
      nodes: "{nodes}"
      partition: "{partition_leonardo}"
      time: "01:00:00"
      env:
        - "NCCL_DEBUG=INFO"
        - "UCX_IB_SL=1"
        - "NCCL_IB_SL=1"
        - "NCCL_HOME=/leonardo/home/userexternal/lcarpent/software-local/nccl-2.29.7-1/build"
        - "NCCL_INC=/leonardo/home/userexternal/lcarpent/software-local/nccl-2.29.7-1/build/include"
