        - "NCCL_NET_GDR_LEVEL=3"
        - "HSA_ENABLE_SDMA=0"
        - "FI_CXI_ATS=0"
        - "UCX_IB_SL=1"
        - "NCCL_IB_SL=1"
        - "NCCL_IGNORE_CPU_AFFINITY=1"
        - "FI_CXI_DEFAULT_CQ_SIZE=13107"
        - "NCCL_MIN_CTAS={channels}"
        - "NCCL_MAX_CTAS={channels}"
