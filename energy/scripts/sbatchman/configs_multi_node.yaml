variables:
  # nodes: [2, 4]
  nodes: [2, 4, 8, 16, 32, 64, 128]

  channels: [2, 4, 8, 16, 32]
  protocols_1: ["Simple", "LL",  "LL128"]
  partition_lumi: [standard-g]
  alg: [Ring, Tree]
  threads: [64, 128, 256, 512]
  partition_leonardo: [boost_usr_prod]

# LUMI Config.
lumi:
  scheduler: slurm

  default_conf:
    account: "project_465002469"
    exclusive: true
    gpus: 8
    partition: bench
    tasks_per_node: 8
    time: "01:00:00"

  configs:
    - name: "a2a_n{nodes}_default_{partition_lumi}"
      exclusive: true
      nodes: "{nodes}"
      partition: "{partition_lumi}"
      time: "01:00:00"
      env:
        - "NCCL_NET_GDR_LEVEL=3"
        - "HSA_ENABLE_SDMA=0"
        - "FI_CXI_ATS=0"
        - "UCX_IB_SL=1"
        - "NCCL_IB_SL=1"
        - "NCCL_IGNORE_CPU_AFFINITY=1"
        - "FI_CXI_DEFAULT_CQ_SIZE=13107"
        - "NCCL_BUFFSIZE=33554432"
        - "EBU_USER_PREFIX=/project/project_465002469/EasyBuild"
        - "NCCL_DEBUG=INFO"
        - "NCCL_SOCKET_IFNAME=hsn0,hsn1,hsn2,hsn3"
      custom_headers: ["export EBU_USER_PREFIX=/project/project_465002469/EasyBuild"]
      modules: ["LUMI/25.03","partition/G", "aws-ofi-rccl/17d41cb-cpeGNU-25.03", "craype-accel-amd-gfx90a", "rocm/6.3.4"]

    - name: "a2a_n{nodes}_algDefault_protDefault_ch{channels}_thDefault_{partition_lumi}"
      exclusive: true
      nodes: "{nodes}"
      partition: "{partition_lumi}"
      time: "01:00:00"
